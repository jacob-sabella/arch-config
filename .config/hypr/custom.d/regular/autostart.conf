# Custom autostart commands

# Load hyprpm plugins (hyprexpo etc.)
exec-once = hyprpm reload -n

# Pyprland for scratchpads and zoom
exec-once = pypr

# ani-tui quickshell overlay — prewarm daemon for instant SUPER+SHIFT+A open
exec-once = qs -p /home/jsabella/.config/quickshell/anitui/shell.qml -d

# GPU Screen Recorder UI (tray daemon, ShadowPlay-style replay)
exec-once = gsr-ui launch-hide-announce
